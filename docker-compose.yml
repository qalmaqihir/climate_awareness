services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: climate_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-climate_gb}
      POSTGRES_USER: ${POSTGRES_USER:-climate_gb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - '127.0.0.1:5432:5432'
    networks:
      - climate_net
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-climate_gb} -d ${POSTGRES_DB:-climate_gb}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: climate_redis
    restart: unless-stopped
    command: ['redis-server', '--maxmemory', '256mb', '--maxmemory-policy', 'allkeys-lru']
    volumes:
      - redis_data:/data
    ports:
      - '127.0.0.1:6379:6379'
    networks:
      - climate_net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: climate_web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-climate_gb}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-climate_gb}
      REDIS_URL: redis://redis:6379
      NEXTAUTH_URL: ${NEXTAUTH_URL:?NEXTAUTH_URL is required}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
    ports:
      - '127.0.0.1:3000:3000'
    networks:
      - climate_net
    profiles: ['app']

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: climate_worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-climate_gb}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-climate_gb}
      REDIS_URL: redis://redis:6379
    networks:
      - climate_net
    profiles: ['app']

  # One-off CLI container for migrations, seeding, and admin creation.
  # Uses the builder stage (has pnpm + tsx + drizzle-kit).
  # Run: docker compose --profile tools run --rm tools <command>
  tools:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: cli
    working_dir: /app
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-climate_gb}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-climate_gb}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - climate_net
    profiles: ['tools']

volumes:
  pg_data:
    driver: local
  redis_data:
    driver: local

networks:
  climate_net:
    driver: bridge
    name: climate_net
