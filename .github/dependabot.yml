version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:00'
      timezone: 'Asia/Karachi'
    commit-message:
      prefix: 'ci(deps)'
    open-pull-requests-limit: 3

  - package-ecosystem: 'pip'
    directory: '/agents'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:00'
      timezone: 'Asia/Karachi'
    commit-message:
      prefix: 'chore(agents-deps)'
    open-pull-requests-limit: 3
    groups:
      python-deps:
        update-types:
          - 'minor'
          - 'patch'
    ignore:
      - dependency-name: '*'
        update-types:
          - 'version-update:semver-major'

  - package-ecosystem: 'npm'
    directory: '/web'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:00'
      timezone: 'Asia/Karachi'
    commit-message:
      prefix: 'chore(web-deps)'
    open-pull-requests-limit: 3
    groups:
      web-deps:
        update-types:
          - 'minor'
          - 'patch'
    ignore:
      - dependency-name: '*'
        update-types:
          - 'version-update:semver-major'

  - package-ecosystem: 'npm'
    directory: '/worker'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:00'
      timezone: 'Asia/Karachi'
    commit-message:
      prefix: 'chore(worker-deps)'
    open-pull-requests-limit: 3
    groups:
      worker-deps:
        update-types:
          - 'minor'
          - 'patch'
    ignore:
      - dependency-name: '*'
        update-types:
          - 'version-update:semver-major'

  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:00'
      timezone: 'Asia/Karachi'
    commit-message:
      prefix: 'chore(infra-deps)'
    open-pull-requests-limit: 3
    ignore:
      - dependency-name: '*'
        update-types:
          - 'version-update:semver-major'
