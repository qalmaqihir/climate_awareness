version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    commit-message:
      prefix: 'ci(deps)'
    open-pull-requests-limit: 5

  - package-ecosystem: 'pip'
    directory: '/agents'
    schedule:
      interval: 'weekly'
      day: 'monday'
    commit-message:
      prefix: 'chore(agents-deps)'
    open-pull-requests-limit: 5
    groups:
      python-minor:
        update-types: ['minor', 'patch']

  - package-ecosystem: 'npm'
    directory: '/web'
    schedule:
      interval: 'weekly'
      day: 'monday'
    commit-message:
      prefix: 'chore(web-deps)'
    open-pull-requests-limit: 5
    groups:
      npm-minor:
        update-types: ['minor', 'patch']

  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    commit-message:
      prefix: 'chore(infra-deps)'
