name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # weekly Monday 06:00 UTC

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy-fs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          skip-dirs: node_modules,.venv,web/.next

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: echo "exists=$([ -f agents/pyproject.toml ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
      - if: steps.check.outputs.exists == 'true'
        uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.11'
      - if: steps.check.outputs.exists == 'true'
        working-directory: agents
        run: |
          uv sync --dev
          uv run pip-audit --strict || true  # advisory until agents deps stabilize

  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: echo "exists=$([ -f web/package.json ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
      - if: steps.check.outputs.exists == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - if: steps.check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - if: steps.check.outputs.exists == 'true'
        working-directory: web
        run: pnpm audit --audit-level=high || true # advisory
