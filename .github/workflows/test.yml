name: Test

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      agents: ${{ steps.paths.outputs.agents }}
      web: ${{ steps.paths.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - id: paths
        run: |
          echo "agents=$([ -f agents/pyproject.toml ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "web=$([ -f web/package.json ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  agents:
    needs: detect
    if: needs.detect.outputs.agents == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.11'
          enable-cache: true
      - run: uv sync --all-extras --dev
      - name: mypy
        run: uv run mypy .
      - name: pytest
        run: uv run pytest
      - name: bandit
        run: uv run bandit -c pyproject.toml -r . -x tests

  web:
    needs: detect
    if: needs.detect.outputs.web == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: type check
        run: pnpm typecheck
      - name: lint
        run: pnpm lint
      - name: test
        run: pnpm test -- --run
